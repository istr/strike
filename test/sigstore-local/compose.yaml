# Local sigstore stack for the strike keyless harness (H1).
# Rootless-Podman-compatible; also runs under docker compose.
# TLS terminated by Caddy (internal CA); hostname resolved via sslip.io.
# Not part of the strike trusted binary.
name: strike-sigstore-local

networks:
  sigstore:
    driver: bridge

volumes:
  posix_storage: {}
  caddy_data: {}
  ct_storage: {}

services:
  caddy:
    # TLS terminator + reverse proxy for Keycloak.
    image: caddy:2.8@sha256:b95ed06fbc6d74d24a40902090c8cc6086ce7d08ba60a3a7e8e62bf164a9d7bb
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      sigstore:
        aliases:
          # In-network resolution of the canonical issuer host overrides
          # sslip.io; must equal the issuer hostname character for character.
          - keycloak.127.0.0.1.sslip.io
          # Fulcio submits issuance to the CT log in-network over TLS; the alias
          # routes the CT host to Caddy, which fronts tesseract.
          - ct.127.0.0.1.sslip.io
    ports:
      - "8443:8443"
      - "5555:5555"
      - "3003:3003"
      - "3004:3004"
      - "6962:6962"
    depends_on:
      keycloak:
        condition: service_started

  keycloak:
    # HTTP-only behind Caddy.
    image: quay.io/keycloak/keycloak:26.1@sha256:dc23dd938a5dc5dfaabc71e44d014928284fafff9122e0395659f1cdcf534da8
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Full external URL so iss and discovery match the canonical issuer.
      KC_HOSTNAME: https://keycloak.127.0.0.1.sslip.io:8443
      # Trust the proxy's forwarded scheme/host (Caddy sets X-Forwarded-*).
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - sigstore
    # No host port: only Caddy reaches Keycloak, in-network at keycloak:8080.

  fulcio:
    image: gcr.io/projectsigstore/fulcio:v1.6.6@sha256:b0ae905e37ad34657c4aed425da649d73353859f1f302b318b6963d65c0e8a23
    command:
      - serve
      - --port=5555
      - --ca=fileca
      - --fileca-cert=/pki/fulcio-root.crt
      - --fileca-key=/pki/fulcio-root.key
      - --fileca-key-passwd=fulcio
      - --ct-log-url=https://ct.127.0.0.1.sslip.io:6962/strike-ct
      - --config-path=/etc/fulcio/config.yaml
    volumes:
      - ./fulcio/config.yaml:/etc/fulcio/config.yaml:ro
      - ./pki/caddy-root.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - ./pki:/pki:ro
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
    networks:
      - sigstore
    depends_on:
      keycloak:
        condition: service_started
      tesseract:
        condition: service_started
    # No container healthcheck: the image lacks a shell for a TCP probe.
    # Functional readiness is the issuer poll in `make up` and the next
    # instruction's sign test.

  rekor:
    # Rekor v2 POSIX (tile/Tessera), no Trillian/DB.
    image: ghcr.io/sigstore/rekor-tiles/posix:v2.2.1@sha256:df1795ee39802422c10d0f6b4803332ae4cfcc07a99556b8f1f59a2aa1aafb57
    command:
      - rekor-server
      - serve
      - --http-address=0.0.0.0
      - --grpc-address=0.0.0.0
      - --hostname=rekor.localhost
      - --storage-dir=/data/log
      - --signer-filepath=/pki/rekor-ed25519.pem
      - --checkpoint-interval=2s
      - --log-level=debug
    volumes:
      - ./pki:/pki:ro
      - posix_storage:/data/log:U
    networks:
      - sigstore
    # No container healthcheck and no depends_on: readiness is polled
    # functionally from the Makefile against the published port. rekor writes
    # its tiles to the storage dir directly; no HTTP tile server is needed for
    # the sign/verify round trip (the inclusion proof is returned at upload and
    # persisted in the bundle; the tile read API is for log monitors only).

  # In-network probe (same DNS vantage as Fulcio). Not started by `up`.
  # podman compose run --rm probe -sk <url>
  probe:
    profiles: ["tools"]
    # Entrypoint is curl; args follow `run probe`.
    image: curlimages/curl:8.11.1@sha256:ce8e655b562cf387752de7d2076ec3f81a4383c908f386b6724ec3571ce08b4a
    networks:
      - sigstore

  # Off by default. Enable only if rekor refuses to serve without a witness
  # (first-run risk R-2): podman compose --profile witness up
  witness:
    profiles: ["witness"]
    build:
      context: https://github.com/transparency-dev/witness.git#main
      dockerfile: cmd/omniwitness/Dockerfile
    networks:
      - sigstore

  tsa:
    # Rekor v2 supplies no integrated timestamp (Path 1); keyless bundles carry
    # an RFC3161 timestamp from this TSA. Memory signer: self-signed TSA cert,
    # chain fetched via `make tsa-certchain` (GET /api/v1/timestamp/certchain).
    image: ghcr.io/sigstore/timestamp-server:v1.2.6@sha256:359b9c8b50c8e46455be8cc38cf455c9788aaf3d8e6d4e25284b85ff7e7a8b7e
    command:
      - serve
      - --host=0.0.0.0
      - --port=3000
      - --timestamp-signer=memory
      - --timestamp-signer-hash=sha256
    networks:
      - sigstore

  tesseract:
    # Static-CT-API CT log on Tessera (POSIX) -- the CTFE, no Trillian. In-network
    # only: cosign never dials it; the SCT is embedded in the leaf at issuance and
    # verified offline against the ctfe key in the trusted root. Distroless/nonroot
    # (no shell) -- no container healthcheck; /healthz is on the root mux and is
    # polled functionally from `make up`. Image is digest-pinned (validated by the
    # CT feasibility spike).
    image: ghcr.io/transparency-dev/tesseract/posix@sha256:3f13c41877dc63995b0273604a54b61c5b573557c5b8f4466b30e523db0b100f
    command:
      - --private_key=/pki/ctfe.key
      - --origin=strike-ct
      - --path_prefix=strike-ct
      - --storage_dir=/data/ct
      - --roots_pem_file=/pki/fulcio-root.crt
      - --ext_key_usages=CodeSigning
      - --http_endpoint=0.0.0.0:6962
    volumes:
      - ./pki:/pki:ro
      - ct_storage:/data/ct:U
    networks:
      - sigstore
