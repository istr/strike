# Builds strike:stage-2 from source using Chainguard tooling.
# Input: source code, Output: strike:stage-2 OCI tar
registry: localhost/strike-bootstrap

steps:
  - name: keygen
    image: cgr.dev/chainguard/melange@sha256:b45739a7d174386d8746774ee0bb9ed70a6ae42e6403088d9ecfa1a31473dcd8
    args: [keygen, --output, /out/melange.rsa]
    outputs:
      - name: signing-key
        type: file
        path: /out/melange.rsa
      - name: signing-key-pub
        type: file
        path: /out/melange.rsa.pub

  - name: build-binary
    image: cgr.dev/chainguard/go@sha256:4ec098b553c8d74d9f01925578660b2bfcdee4ef45e5ab082250cf9675a0e28b
    args: [build, -trimpath, -ldflags=-s -w, -o, /out/strike, ./...]
    sources:
      - path: .
        mount: /src
    outputs:
      - name: binary
        type: file
        path: /out/strike

  - name: build-package
    image: cgr.dev/chainguard/melange@sha256:b45739a7d174386d8746774ee0bb9ed70a6ae42e6403088d9ecfa1a31473dcd8
    args: [build, /src/melange.yaml,
           --signing-key, /run/key,
           --arch, x86_64]
    inputs:
      - name: signing-key
        from: keygen
        mount: /run/key
      - name: binary
        from: build-binary
        mount: /run/strike-binary
    sources:
      - path: ./melange.yaml
        mount: /src/melange.yaml
    outputs:
      - name: packages
        type: directory
        path: /out/packages

  - name: build-image-stage2
    image: cgr.dev/chainguard/apko@sha256:b08db34494f3f8cc7a02b10f04546213a89321cd11b94ff2dcff892d44815b43
    args: [build, /src/apko.yaml, strike:stage-2, /out/image.tar]
    inputs:
      - name: packages
        from: build-package
        mount: /run/packages
      - name: signing-key-pub
        from: keygen
        mount: /run/key.pub
    sources:
      - path: ./apko.yaml
        mount: /src/apko.yaml
    outputs:
      - name: image
        type: oci-tar
        path: /out/image.tar
