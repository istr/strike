# Build strike, prove reproducibility, publish.
# Run: strike run lane.yaml
registry: ghcr.io/istr/strike-cache

secrets:
  cosign_key:      env://COSIGN_PRIVATE_KEY
  cosign_password: env://COSIGN_PASSWORD
  ghcr_token:      env://GHCR_TOKEN

steps:
  - name: build_binary
    image: cgr.dev/chainguard/go@sha256:4ec098b553c8d74d9f01925578660b2bfcdee4ef45e5ab082250cf9675a0e28b
    args: [build, -C, /src, -trimpath, "-ldflags=-s -w", -o, /out/strike, .]
    env:
      CGO_ENABLED: "0"
    network: true
    sources:
      - path: .
        mount: /src
    outputs:
      - name: binary
        type: file
        path: /out/strike

  - name: build_image
    pack:
      base: cgr.dev/chainguard/static@sha256:2fdfacc8d61164aa9e20909dceec7cc28b9feb66580e8e1a65b9f2443c53b61b
      files:
        - from: build_binary/binary
          dest: /usr/bin/strike
          mode: 0o755
    secrets:
      - name: cosign_key
        env: COSIGN_PRIVATE_KEY
      - name: cosign_password
        env: COSIGN_PASSWORD
    outputs:
      - name: image
        type: oci-tar
        path: /out/image.tar

  - name: stage_2
    image_from:
      step: build_image
      output: image
    args: [/usr/bin/strike, run, /src/bootstrap/lace.yaml]
    network: true
    sources:
      - path: .
        mount: /src
    outputs:
      - name: stage_3_image
        type: oci-tar
        path: /out/image.tar

  - name: compare
    image_from:
      step: build_image
      output: image
    args: [compare, /run/stage_2.tar, /run/stage_3.tar, /out/result]
    inputs:
      - name: image
        from: build_image
        mount: /run/stage_2.tar
      - name: stage_3_image
        from: stage_2
        mount: /run/stage_3.tar
    outputs:
      - name: result
        type: file
        path: /out/result

  - name: publish
    image: quay.io/skopeo/stable@sha256:3ee9454e356fdda4ebd10157b5692b84537131109c4996782bb02957041ac000
    network: true
    args:
      - copy
      - oci-archive:/run/stage_2.tar
      - docker://ghcr.io/istr/strike:latest
    inputs:
      - name: image
        from: build_image
        mount: /run/stage_2.tar
      - name: result
        from: compare
        mount: /run/compare_result
    secrets:
      - name: ghcr_token
        env: REGISTRY_AUTH_FILE
    outputs:
      - name: published_ref
        type: file
        path: /out/ref.txt
