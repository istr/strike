# Rebuild strike from source to prove reproducibility.
# Run by stage_2 inside the built strike image with source at /src.
name: strike-bootstrap
registry: localhost/strike-bootstrap

secrets:
  cosign_key:      env://COSIGN_PRIVATE_KEY
  cosign_password: env://COSIGN_PASSWORD

steps:
  - name: build_binary
    image: cgr.dev/chainguard/go@sha256:4ec098b553c8d74d9f01925578660b2bfcdee4ef45e5ab082250cf9675a0e28b
    args: [build, -C, /src, -trimpath, "-buildvcs=false", "-ldflags=-s -w", -o, /out/strike, ./cmd/strike]
    env:
      CGO_ENABLED: "0"
    network: true
    sources:
      - path: ./src
        mount: /src
    outputs:
      - name: binary
        type: file
        path: /out/strike

  - name: build_image
    pack:
      base: cgr.dev/chainguard/static@sha256:2fdfacc8d61164aa9e20909dceec7cc28b9feb66580e8e1a65b9f2443c53b61b
      files:
        - from: build_binary.binary
          dest: /usr/bin/strike
          mode: 0o755
    secrets:
      - name: cosign_key
        env: COSIGN_PRIVATE_KEY
      - name: cosign_password
        env: COSIGN_PASSWORD
    outputs:
      - name: image
        type: image
        path: /out/image.tar
