version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - goimports
    - gofumpt

linters:
  enable:
    # Bug detection
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - bodyclose
    - noctx
    - nilerr

    # Security
    - gosec
    - bidichk

    # Style and correctness
    - revive
    - goconst
    - misspell
    - errname
    - godot
    - errorlint

    # Complexity
    - gocyclo
    - gocognit
    - funlen
    - nestif

    # Modern Go
    - copyloopvar
    - intrange
    - usestdlibvars

    # Code hygiene
    - dupl
    - nakedret
    - asciicheck
    - testpackage
    - nolintlint
    - predeclared

    # Code security invariants
    - forbidigo
    - depguard

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 80
      statements: 50
    gosec:
      excludes: []
    nestif:
      min-complexity: 5
    godot:
      scope: toplevel
    nolintlint:
      require-explanation: true
      require-specific: true
    forbidigo:
      forbid:
        # All output goes through log.* backed by fatalWriter.
        # fmt.Errorf and fmt.Sprintf are not matched (different prefix).
        - pattern: 'fmt\.Print(ln|f)?'
          msg: "use log.Printf -- all output through log.* (AGENTS.md)"
        - pattern: 'fmt\.Fprint(ln|f)?'
          msg: "use log.Printf -- all output through log.* (AGENTS.md)"
        # Zero subprocess execution. Belt-and-suspenders with depguard.
        - pattern: 'exec\.(Command|LookPath)'
          msg: "use container.Engine API -- no subprocess execution (AGENTS.md invariant 1)"
    depguard:
      rules:
        all:
          deny:
            - pkg: os/exec
              desc: "no subprocess execution -- use container.Engine API"
            - pkg: math/rand
              desc: "use crypto/rand -- math/rand is not cryptographically secure"
            - pkg: math/rand/v2
              desc: "use crypto/rand -- math/rand/v2 is not cryptographically secure"
            - pkg: crypto/md5
              desc: "use crypto/sha256 -- MD5 is not collision resistant"
            - pkg: crypto/sha1
              desc: "use crypto/sha256 -- SHA-1 is not collision resistant"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 50
  exclude-rules:
    # Test files: relax complexity limits (table-driven tests are long)
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - gocognit
        - dupl
    # Generated code: skip all linters
    - path: cue_types_lane_gen\.go
      linters:
        - godot
        - revive
        - govet
