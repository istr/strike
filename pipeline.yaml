registry: ghcr.io/istr/strike-cache

secrets:
  ghcr_token: env://GHCR_TOKEN

steps:
  # Stage 1: bootstrap strike runs itself inside the stage_1 container
  - name: stage_1
    image: strike:stage_1
    args: [run, /src/bootstrap/pipeline-stage1.yaml]
    sources:
      - path: .
        mount: /src
    outputs:
      - name: stage2_image
        type: oci-tar
        path: /out/image.tar

  # Stage 2: strike:stage_2 rebuilds itself into strike:stage_3
  - name: stage_2
    image_from:
      step: stage_1
      output: stage2_image
    args: [run, /src/bootstrap/pipeline-stage2.yaml]
    sources:
      - path: .
        mount: /src
    outputs:
      - name: stage3_image
        type: oci-tar
        path: /out/image.tar

  # Compare: stage_2 == stage_3 proves reproducibility
  - name: compare
    image: strike:stage_1
    args: [compare, /run/stage2.tar, /run/stage3.tar, /out/result]
    inputs:
      - name: stage2_image
        from: stage_1
        mount: /run/stage2.tar
      - name: stage3_image
        from: stage_2
        mount: /run/stage3.tar
    outputs:
      - name: result
        type: file
        path: /out/result

  # Publish: stage_2 image (after successful comparison)
  - name: publish
    image: quay.io/skopeo/stable@sha256:3ee9454e356fdda4ebd10157b5692b84537131109c4996782bb02957041ac000
    args:
      - copy
      - oci-archive:/run/stage2.tar
      - docker://ghcr.io/istr/strike:latest
    inputs:
      - name: stage2_image
        from: stage_1
        mount: /run/stage2.tar
      - name: result
        from: compare
        mount: /run/compare_result
    secrets:
      - name: ghcr_token
        env: REGISTRY_AUTH_FILE
    outputs:
      - name: published_ref
        type: file
        path: /out/ref.txt
