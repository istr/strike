registry: ghcr.io/istr/strike-cache

secrets:
  ghcr-token: env://GHCR_TOKEN

steps:
  # Stage 1: bootstrap strike runs itself inside the stage-1 container
  - name: stage-1
    image: strike:stage-1
    args: [run, /src/bootstrap/pipeline-stage1.yaml]
    sources:
      - path: .
        mount: /src
    outputs:
      - name: stage2-image
        type: oci-tar
        path: /out/image.tar

  # Stage 2: strike:stage-2 rebuilds itself into strike:stage-3
  - name: stage-2
    image_from:
      step: stage-1
      output: stage2-image
    args: [run, /src/bootstrap/pipeline-stage2.yaml]
    sources:
      - path: .
        mount: /src
    outputs:
      - name: stage3-image
        type: oci-tar
        path: /out/image.tar

  # Compare: stage-2 == stage-3 proves reproducibility
  - name: compare
    image: strike:stage-1
    args: [compare, /run/stage2.tar, /run/stage3.tar, /out/result]
    inputs:
      - name: stage2-image
        from: stage-1
        mount: /run/stage2.tar
      - name: stage3-image
        from: stage-2
        mount: /run/stage3.tar
    outputs:
      - name: result
        type: file
        path: /out/result

  # Publish: stage-2 image (after successful comparison)
  - name: publish
    image: quay.io/skopeo/stable@sha256:3ee9454e356fdda4ebd10157b5692b84537131109c4996782bb02957041ac000
    args:
      - copy
      - oci-archive:/run/stage2.tar
      - docker://ghcr.io/istr/strike:latest
    inputs:
      - name: stage2-image
        from: stage-1
        mount: /run/stage2.tar
      - name: result
        from: compare
        mount: /run/compare-result
    secrets:
      - name: ghcr-token
        env: REGISTRY_AUTH_FILE
    outputs:
      - name: published-ref
        type: file
        path: /out/ref.txt
