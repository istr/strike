name: deploy-test
registry: localhost:5555/test
secrets: {}
steps:
  - name: compile
    image: docker.io/library/golang@sha256:abababababababababababababababababababababababababababababababab
    args: [go, build, -o, /out/binary]
    env:
      CGO_ENABLED: "0"
    inputs: []
    secrets: []
    outputs:
      - name: binary
        type: file
        path: /out/binary
  - name: pack
    pack:
      base: docker.io/library/static@sha256:cdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcd
      files:
        - from: compile.binary
          dest: /app
          mode: 0o755
      config:
        entrypoint: [/app]
    args: []
    env: {}
    inputs: []
    secrets: []
    outputs:
      - name: image
        type: image
        path: /out/image.tar
  - name: deploy
    deploy:
      method:
        type: custom
        image: docker.io/library/alpine@sha256:efefefefefefefefefefefefefefefefefefefefefefefefefefefefefefefef
      artifacts:
        img:
          from: pack.image
      target:
        type: registry
        description: deploy to registry
      attestation:
        pre_state:
          required: false
          capture: []
        post_state:
          required: false
          capture: []
        drift:
          detect: false
          on_drift: warn
    args: []
    env: {}
    inputs: []
    secrets: []
    outputs: []
