# .go-arch-lint.yml
# Enforces the internal package layering of github.com/istr/strike.
# Invariant: dependencies may not point upward across tiers; downward edges are
# allowed. contract depends on nothing internal; foundation depends on nothing
# internal except contract; services may have intra-tier edges, orchestration
# may not.
# Test files and non-product code (tools, fixtures) are out of scope.
#
#   entry          I=1.00      cmd/strike
#   orchestration  I~0.71-0.91 executor, deploy
#   services       I~0.43-0.67 container, lane, copier, mediator, registry,
#                              capsule, front, resolver, verify
#   transport      I=0.22      transport                 (base infrastructure)
#   concept        I~0.00      endpoint                  (composed contract value types; depends only on primitive)
#   foundation     I~0.00-0.33 bundle, clock, closer, egress, probe, schema  (no internal deps except contract)
#   primitive      I=0.00      primitive                 (irreducible contract value vocabulary; no internal deps)
#   contract       I=0.00      contract                  (layer 0; embedded contract data, no internal deps)

version: 3

allow:
  depOnAnyVendor: true        # only internal layering is enforced here
  deepScan: true              # govern static imports, and DI/call-graph flows

# Test code is not part of the shipped architecture and legitimately crosses
# layers; exclude it. Non-product directories are excluded as well.
excludeFiles:
  - "_test\\.go$"
exclude:
  - tools                     # custom tooling (lintfrom), not the product
  - test                      # integration/crossval packages + testdata fixtures
  - internal/testutil         # test scaffolding
  - internal/registry/regtest # test double

components:
  contract:
    in: contract
  foundation:
    in:
      - internal/bundle
      - internal/clock
      - internal/closer
      - internal/egress
      - internal/probe
      - internal/schema
  primitive:
    in: internal/primitive
  transport:
    in: internal/transport
  concept:
    in:
      - internal/endpoint
      - internal/output
      - internal/provenance
      - internal/record
  services:
    in:
      - internal/container
      - internal/lane
      - internal/copier
      - internal/mediator
      - internal/registry
      - internal/capsule
      - internal/front
      - internal/resolver
      - internal/verify
  orchestration:
    in:
      - internal/executor
      - internal/deploy
  entry:
    in: cmd/strike

deps:
  # contract and primitive have no mayDependOn: they depend on nothing internal (ADR-044).
  concept:
    mayDependOn:
      - primitive             # concept value types compose from the leaf vocabulary only
  foundation:
    mayDependOn:
      - contract              # embedded schema data, the only internal edge foundation may make
  transport:
    mayDependOn:
      - concept
      - foundation
      - contract
      - primitive
  services:
    mayDependOn:
      - services              # allow intra-tier edges (capsule->mediator, etc.)
      - transport
      - concept
      - foundation
      - primitive
      - contract
  orchestration:
    mayDependOn:
      - services
      - transport
      - concept
      - foundation
      - primitive
      - contract
  entry:
    mayDependOn:
      - orchestration
      - services
      - transport
      - concept
      - foundation
      - primitive
      - contract
