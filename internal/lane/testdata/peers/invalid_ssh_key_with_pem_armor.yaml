name: peers-ssh-one
lane_id: peers-ssh-one
registry: localhost:5555/test
secrets: {}
steps:
  - name: clone
    image: docker.io/library/alpine@sha256:abababababababababababababababababababababababababababababababab
    args: [git, clone, "git@git.example.com:org/repo"]
    env: {}
    inputs: []
    secrets: []
    outputs:
      - name: tree
        type: directory
        path: /out/tree
    peers:
      - type: ssh
        host: git.example.com
        known_hosts:
          - key_type: ssh-ed25519
            key: "-----BEGIN PUBLIC KEY-----\nABC\n-----END PUBLIC KEY-----"
