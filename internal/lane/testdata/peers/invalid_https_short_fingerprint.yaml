name: peers-https-fp
lane_id: peers-https-fp
registry: localhost:5555/test
secrets: {}
steps:
  - name: fetch
    image: docker.io/library/alpine@sha256:abababababababababababababababababababababababababababababababab
    args: [wget, "https://example.com/file"]
    env: {}
    inputs: []
    secrets: []
    outputs:
      - name: file
        type: file
        path: /out/file
    peers:
      - type: https
        host: example.com
        trust:
          mode: cert_fingerprint
          fingerprint: sha256:abc123
