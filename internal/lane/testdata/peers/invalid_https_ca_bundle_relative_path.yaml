name: peers-https-ca
lane_id: peers-https-ca
registry: localhost:5555/test
secrets: {}
steps:
  - name: fetch
    image: alpine:3.20
    args: [wget, "https://internal.example/file"]
    env: {}
    inputs: []
    secrets: []
    outputs:
      - name: file
        type: file
        path: /out/file
    peers:
      - type: https
        host: internal.example
        trust:
          mode: ca_bundle
          path: etc/ssl/ca.pem
