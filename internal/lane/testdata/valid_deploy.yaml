name: deploy-lane
lane_id: deploy-lane
registry: localhost:5555/test
secrets: {}
steps:
  - name: build
    image: docker.io/library/golang@sha256:abababababababababababababababababababababababababababababababab
    args: ["go", "build"]
    env: {}
    inputs: []
    secrets: []
    outputs:
      - name: binary
        type: file
        path: /out/binary
  - name: deploy
    deploy:
      method:
        type: registry
        source: localhost:5555/test/image:latest
        target: registry.example.com/app:latest
      artifacts:
        binary:
          from: build.binary
      target:
        id: prod-registry
        type: registry
        description: push to registry
      attestation:
        pre_state:
          required: false
          capture: []
        post_state:
          required: false
          capture: []
    args: []
    env: {}
    inputs: []
    secrets: []
    outputs: []
